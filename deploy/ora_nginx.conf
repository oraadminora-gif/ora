# Nginx — ORA Mentorat (Hetzner — tout sur un serveur)
# Généré par setup_vps.sh avec le bon domaine
# Chemin sur le serveur : /etc/nginx/sites-available/ora

server {
    listen 80;
    server_name objectifreussirapprentissage.eu www.objectifreussirapprentissage.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name objectifreussirapprentissage.eu www.objectifreussirapprentissage.eu;

    # SSL — Let's Encrypt via Certbot
    ssl_certificate     /etc/letsencrypt/live/objectifreussirapprentissage.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/objectifreussirapprentissage.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # En-têtes de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    client_max_body_size 10M;

    # ── API Django ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://unix:/run/ora/gunicorn.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Admin Django ─────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://unix:/run/ora/gunicorn.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Fichiers statiques Django (admin UI, DRF) ────────────────
    location /static/ {
        alias   /var/www/ora/ora_backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Frontend React (build Vite servi par Nginx) ──────────────
    root  /var/www/ora/frontend_build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Assets Vite (hachés → cache long)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
